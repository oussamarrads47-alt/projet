{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | TRANS-GEST</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #2563EB;
            --dark-blue: #1E40AF;
            --black: #0F1117;
            --gray-light: #F3F4F6;
            --gray-medium: #9CA3AF;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--white);
            color: var(--black);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 3rem;
            background: var(--white);
            text-align: center;
            border-radius: 12px;
            border: 1px solid rgba(37, 99, 235, 0.15); /* Transparent-ish border */
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .login-logo img {
            width: 65px;
            height: auto;
        }

        .brand-text {
            font-size: 1.75rem;
            font-weight: 900;
            color: var(--primary-blue);
            letter-spacing: -0.02em;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--black);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-medium);
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid #D1D5DB;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input:focus + i {
            color: var(--primary-blue);
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .login-btn:hover {
            background-color: var(--dark-blue);
        }

        .alert-error {
            background-color: #FEE2E2;
            border: 1px solid #F87171;
            color: #991B1B;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-text {
            margin-top: 3.5rem;
            font-size: 0.75rem;
            color: var(--gray-medium);
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <div class="login-card">
        
        <div class="login-brand">
            <div class="login-logo">
                <img src="{% static 'images/transgest_logo.png' %}" alt="Logo">
            </div>
            <div class="brand-text">TRANS GEST</div>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="username">Identifiant</label>
                <div class="input-wrapper">
                    <input type="text" name="username" id="username" class="form-input" placeholder="Utilisateur" required autofocus>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <span>SE CONNECTER</span>
                <i class="fas fa-sign-in-alt"></i>
            </button>
        </form>

        <div class="footer-text">
            TRANS-GEST © 2024
        </div>
    </div>

</body>

</html>
