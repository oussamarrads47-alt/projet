{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto animate-fade-in">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'document_list' %}"
            class="p-2 text-gray-400 hover:text-brand-700 hover:bg-brand-50 rounded-xl transition-colors"><i
                class="fas fa-arrow-left"></i></a>
        <div>
            <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
                <i class="fas fa-file-alt text-brand-600"></i>
                {{ title }}
            </h1>
            <p class="text-sm text-gray-500 mt-0.5">Informations du document</p>
        </div>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 lg:p-8">
        <form method="POST">
            {% csrf_token %}
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                {% for field in form %}
                <div
                    class="{% if field.name == 'description' or field.name == 'observations' %}sm:col-span-2{% endif %}">
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1.5">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<p class="text-xs text-red-500 mt-1">{{ error }}</p>{% endfor %}
                </div>
                {% endfor %}
            </div>
            <div class="flex items-center gap-3 mt-8 pt-6 border-t border-gray-100">
                <button type="submit"
                    class="inline-flex items-center gap-2 px-6 py-2.5 bg-gradient-to-r from-red-600 to-red-700 text-white text-sm font-semibold rounded-xl hover:shadow-lg hover:shadow-red-600/25 transition-all">
                    <i class="fas fa-save text-xs"></i> Sauvegarder les modifications
                </button>
                <a href="{% url 'document_list' %}"
                    class="px-6 py-2.5 text-sm font-medium text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors">Annuler</a>
            </div>
        </form>
    </div>
</div>
<style>
    form select,
    form input[type="text"],
    form input[type="date"],
    form textarea {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1px solid #d1d5db;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        color: #111827;
        background: white;
        transition: all 0.2s;
        outline: none;
    }

    form select:focus,
    form input:focus,
    form textarea:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }

    form select {
        appearance: auto;
    }

    form textarea {
        min-height: 80px;
        resize: vertical;
    }
</style>
{% endblock %}
